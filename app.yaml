command:
  - uvicorn
  - backend.app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"
env:
  # Use workspace URL — app cannot reach ai-gateway.cloud.databricks.com (ConnectError)
  - name: DATABRICKS_HOST
    value: "https://e2-demo-field-eng.cloud.databricks.com"
  # 5-model fallback chain — on 429 rate limit, switch to next
  - name: DATABRICKS_LLM_MODEL
    value: "databricks-claude-sonnet-4-6,databricks-meta-llama-3-1-70b-instruct,databricks-gemini-2-5-flash,databricks-claude-sonnet-4-5,databricks-claude-opus-4-6"
  # Injected from App Resources. Auth uses app's service principal (no PAT needed).
  - name: BRAVE_SEARCH_API_KEY
    valueFrom: brave_api_key
  - name: UCDP_ACCESS_TOKEN
    valueFrom: ucdp_access_token
